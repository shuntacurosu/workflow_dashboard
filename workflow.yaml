# Workflow Dashboard Configuration
# タスクの追加・編集はこのファイルで行います

title: Data Pipeline Workflow

tasks:
  # --- Task A: データ取得 ---
  - name: data_fetcher
    label: Data Fetcher
    description: Fetch data from external APIs and save locally
    cwd: ./tasks/task_a
    command: uv run main.py
    args:
      required:
        - name: url
          flag: --url
          type: string
          description: API endpoint URL
          placeholder: "https://api.example.com/data"
      optional:
        - name: count
          flag: --count
          type: number
          default: 5
          description: Number of items to fetch

  # --- Task B: データ加工 ---
  - name: data_processor
    label: Data Processor
    description: Process and transform fetched data
    cwd: ./tasks/task_b
    command: uv run main.py
    args:
      required:
        - name: input
          flag: --input
          type: string
          description: Input file path
          placeholder: input.json
        - name: output
          flag: --output
          type: string
          description: Output file path
          placeholder: output.json
      optional: []

  # --- Task C: レポート生成 ---
  - name: report_generator
    label: Report Generator
    description: Generate reports from processed data
    cwd: ./tasks/task_c
    command: uv run main.py
    args:
      required: []
      optional:
        - name: format
          flag: --format
          type: select
          options: [pdf, html, csv]
          default: pdf
          description: Report output format
        - name: target
          flag: --target
          type: string
          default: report
          description: Target filename (without extension)
